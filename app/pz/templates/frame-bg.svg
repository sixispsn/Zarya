<!-- Взам. инв. № : y 207..232 -->
<rect x="8" y="207" width="5" height="25" fill="none" stroke="black" stroke-width="0.3"/>
<rect x="13" y="207" width="7" height="25" fill="none" stroke="black" stroke-width="0.3"/>
<text x="10.5" y="219.5" font-size="2.7" text-anchor="middle" transform="rotate(-90 10.5 219.5)" font-family="serif">Взам. инв. №</text>
<!-- Подп. и дата : y 232..267 -->
<rect x="8" y="232" width="5" height="35" fill="none" stroke="black" stroke-width="0.3"/>
<rect x="13" y="232" width="7" height="35" fill="none" stroke="black" stroke-width="0.3"/>
<text x="10.5" y="249.5" font-size="2.7" text-anchor="middle" transform="rotate(-90 10.5 249.5)" font-family="serif">Подп. и дата</text>
<!-- Инв. № подл. : y 267..292 -->
<rect x="8" y="267" width="5" height="25" fill="none" stroke="black" stroke-width="0.3"/>
<rect x="13" y="267" width="7" height="25" fill="none" stroke="black" stroke-width="0.3"/>
<text x="10.5" y="279.5" font-size="2.7" text-anchor="middle" transform="rotate(-90 10.5 279.5)" font-family="serif">Инв. № подл.</text>
<!-- Подпись формата -->
<text x="205" y="295.5" font-size="2.5" text-anchor="end" font-family="serif">Формат А4</text>
</svg>
