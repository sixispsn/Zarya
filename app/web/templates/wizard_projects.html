<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<title>Заря — мои проекты</title>
<style>
  :root { --acc:#b45309; --bg:#faf8f5; --line:#e5dfd5; }
  body { font-family:system-ui,-apple-system,sans-serif; margin:0; background:var(--bg); color:#1c1917; }
  header { background:#292524; color:#fafaf9; padding:14px 28px; display:flex; align-items:baseline; gap:14px; }
  header h1 { margin:0; font-size:20px; }
  main { max-width:820px; margin:26px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:18px 22px; }
  table { width:100%; border-collapse:collapse; font-size:15px; }
  td, th { padding:9px 8px; border-bottom:1px solid var(--line); text-align:left; }
  th { color:#78716c; font-size:12px; font-weight:600; text-transform:uppercase; }
  a.open { color:var(--acc); font-weight:600; text-decoration:none; }
  a.new { display:inline-block; margin-bottom:16px; background:var(--acc); color:#fff;
          padding:9px 20px; border-radius:7px; text-decoration:none; font-weight:600; }
  button.del { background:none; border:none; color:#b91c1c; cursor:pointer; font-size:13px; }
  .empty { color:#78716c; padding:24px 0; text-align:center; }
</style></head><body>
<header><h1>Заря · мои проекты</h1></header>
<main>
<a class="new" href="/wizard">+ Новый расчёт</a>
<div class="card">
{% if projects %}
<table>
  <tr><th>Проект</th><th>Обновлён</th><th></th></tr>
  {% for p in projects %}
  <tr>
    <td><a class="open" href="/wizard/open/{{ p.project_id }}">{{ p.title }}</a></td>
    <td>{{ p.updated_at[:16].replace('T', ' ') }}</td>
    <td><form method="post" action="/wizard/projects/{{ p.project_id }}/delete"
              onsubmit="return confirm('Удалить проект?')">
        <button class="del" type="submit">удалить</button></form></td>
  </tr>
  {% endfor %}
</table>
{% else %}
<div class="empty">Пока нет сохранённых проектов. Каждый расчёт сохраняется автоматически.</div>
{% endif %}
</div>
</main></body></html>
